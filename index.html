<!DOCTYPE html>
<html>

<head>
    <title>Add Movies</title>
    <link rel="stylesheet" href="styles.css" />

    <style>
        body {
            font-family: Impact, 'Arial Narrow Bold', sans-serif;
            background: #7f2623;
            margin: 0;
            padding: 67px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: #fcf8f6;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 6 4px 7px rgba(67, 25, 25, 0.1);
        }

        h1 {
            text-align: center;
            color: #7d0d0d;
        }

        h2 {
            text-align: center;
            color: #744848;
        }

        label {
            display: block;
            margin: 6px 0 7px;
            font-weight: bold;
            color: #000000;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #a34a4a;
            border-radius: 5px;
            font-size: 14px;
        }

        .stars {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
        }

        .star {
            font-size: 28px;
            color: #5f530c;
            cursor: pointer;
            transition: color 0.2s;
        }

        .star:hover,
        .star.selected {
            color: gold;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #400808;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #b30000;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #643b3b;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .rating-display {
            color: rgb(173, 33, 33);
            font-size: 20px;
            margin-left: 5px;
        }

        .movie-buttons {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Add Movies</h1>
        <form id="dForm">
            Title :<input type="text" id="MovieTitle" /><br>
            Year :<input type="number" id="YearPublished" /><br>
            <label for="Genre">Genre:</label>
            <select name="MovieGenre" id="moviegenrechoosing">
                <option value="horror">Horror</option>
                <option value="action">Action</option>
                <option value="adventure">Adventure</option>
                <option value="romance">Romance</option>
                <option value="comedy">Comedy</option>
                <option value="drama">Drama</option>
                <option value="scifi">Sci-Fi</option>
                <option value="SixSeven">SixSeven</option>
            </select>
            <label>Rating:</label>
            <div class="stars" id="ratingStars">
                <span class="star" data-value="1">✮</span>
                <span class="star" data-value="2">✮</span>
                <span class="star" data-value="3">✮</span>
                <span class="star" data-value="4">✮</span>
                <span class="star" data-value="5">✮</span>
            </div>
        </form>
        <button type="button" onclick="addMovie()">Add Movie</button>

        <h2>Movie List</h2>
        <ul id="movieList"></ul>
    </div>

    <script>
        let selectedRating = 0;
        let editIndex = -1;

        document.querySelectorAll(".star").forEach(star => {
            star.addEventListener("click", function () {

                selectedRating = this.getAttribute("data-value");
                updateStars(selectedRating);

            });
        });

        function updateStars(rating) {

            document.querySelectorAll(".star").forEach(star => {

                star.classList.remove("selected");

                if (star.getAttribute("data-value") <= rating) {
                    star.classList.add("selected");
                }

            });

        }

        let savedmovies = localStorage.getItem("movies");

        if (!savedmovies) {
            MovieList = [];
        } else {
            MovieList = JSON.parse(savedmovies);
        }

        function addMovie() {

            event.preventDefault();

            let title = document.getElementById("MovieTitle").value;
            let year = document.getElementById("YearPublished").value;
            let genre = document.getElementById("moviegenrechoosing").value;

            if (title == "" || year == "") {
                alert("Oops! You're missing some fields. Please fill them all.");
                return;
            }

            let moviez = {
                title: title,
                year: year,
                genre: genre,
                rating: selectedRating
            };
            if (editIndex === -1) {
                MovieList.push(moviez);
            } else {
                MovieList[editIndex] = moviez;
                editIndex = -1;
            }
            localStorage.setItem("moviezs", JSON.stringify(MovieList));
            clearForm();
            displayMovies();
        }

        function displayMovies() {
            let output = "";
            for (let i = 0; i < MovieList.length; i++) {
                output +=
                    "<li>" +
                    "<b>" + MovieList[i].title + "</b> (" + MovieList[i].year + ")<br>" +
                    "Genre: " + MovieList[i].genre + "<br>" +
                    "Rating: " + "⭐".repeat(MovieList[i].rating) +
                    "<div class='movie-buttons'>" +
                    "<button type='button' onclick='editMovie(" + i + ")'>Update</button>" +
                    "<button type='button' onclick='deleteMovie(" + i + ")'>Delete</button>" +
                    "</div>" +
                    "</li>";
            }
            document.getElementById("movieList").innerHTML = output;
        }
        function deleteMovie(index) {
            let confirmDelete = confirm("Are you sure you want to delete this movie?");
            if (confirmDelete) {
                MovieList.splice(index, 1);
                localStorage.setItem("moviez", JSON.stringify(MovieList));
                displayMovies();
            }
        }
        function editMovie(index) {
            let movie = MovieList[index];
            document.getElementById("MovieTitle").value = movie.title;
            document.getElementById("YearPublished").value = movie.year;
            document.getElementById("moviegenrechoosing").value = movie.genre;
            selectedRating = movie.rating;
            updateStars(selectedRating);
            editIndex = index;
        }
        function clearForm() {
            document.getElementById("MovieTitle").value = "";
            document.getElementById("YearPublished").value = "";
            document.getElementById("moviegenrechoosing").value = "horror";
            selectedRating = 0;
            updateStars(0);
        }
        window.onload = displayMovies;
    </script>

</body>

</html>
